<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta property="og:title" content="Ahogado">
    <meta property="og:description" content="Divertido juego para adivinar la frase oculta, con diferentes categorías">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lufebadeca.github.io/algoritmosFCA/">
    <meta property="og:image" content="https://github.com/lufebadeca/algoritmosFCA/blob/main/pictures/Gameplay.jpg?raw=true">

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="styles-hangman-menu.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <title>Ahogado</title>
</head>
<body>
    
    <nav class="navbar">
        <div class="navbar-logo">
            <a href="index.html">
                <img src="./pictures/sharkie.png" width="55px" alt="sharkie">
            </a>
        </div>

        <div class="navbar-menu">
            <a href="hangman.html"><img src="./pictures/sound_bria.png" alt="mute" width="20px"></a>
            <a href="hangman.html"><img src="./pictures/mute_bria.png" alt="mute" width="20px"></a>
            <a href="https://github.com/lufebadeca/algoritmosFCA"><img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="github" width="20px"></a>
            <a href="https://www.linkedin.com/in/fernando-baldovino-1a9213233/"><img src="https://img.icons8.com/?size=60&id=98960&format=png" alt="github" width="20px"></a>
        </div>
    </nav>

    <div class="container-menu">
        <div id="menu" class="menu">

            <img src="./pictures/title.png" alt="">

            <img class="balloon" src="./pictures/balloon.png" alt="balloon">

            <h2 id="title">Escoge tu categoría</h2>

            <div id="categories-div" class="categories-div">
                <div class="categories" id="books">
                    <img class="img" src="./pictures/book.png" alt="books">
                </div>
                <div class="categories" id="films">
                    <img class="img" src="./pictures/film.png" alt="films">
                </div>
                <div class="categories" id="animals">
                    <img class="img" src="./pictures/animal.png" alt="animals">
                </div>
                <div class="categories" id="sayings">
                    <img class="img" src="./pictures/sayings.png" alt="sayings">
                </div>
                <div class="categories" id="random">
                    <img class="img" src="./pictures/random.png" alt="random">
                </div>
            </div>
        </div>
        <button id="start-button" class="start-button " disabled="true">
            <img src="./pictures/START.png" alt="">
        </button>

    </div>

    <audio id="hoverSound" src="./sounds/click.wav" preload="auto"></audio>
    <audio id="clickSound" src="./sounds/menu-click.wav" preload="auto"></audio>
    <audio id="gameSound" src="./sounds/music.mp3" preload="auto"></audio>
    <audio id="splashSound" src="./sounds/splash.wav" preload="auto"></audio>

    <script src="script-hangman-menu.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
